<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Demonstração de Vitrine — Atommotec</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none; }

    a   { text-decoration: none; color: inherit; -webkit-tap-highlight-color: transparent; }
    img { display: block; max-width: 100%; }
    ul  { list-style: none; }

    :root {
      --navy:      #0C1E52;
      --azul:      #1548B0;
      --azul-2:    #1A5ED4;
      --ciano:     #28AADC;
      --ciano-2:   #4CC4F0;
      --branco:    #FFFFFF;
      --radius:    8px;
      --trans:     .3s ease;
      --header-h:  72px;
      --ff-titulo: 'Exo 2', sans-serif;
      --ff-corpo:  'Inter', sans-serif;
    }

    /* ── HEADER (idêntico ao index) ── */
    #header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; height: var(--header-h); background: var(--branco); border-bottom: 1px solid rgba(12,30,82,.1); transition: box-shadow .3s; }
    #header.scrolled { box-shadow: 0 4px 24px rgba(12,30,82,.14); }
    .header-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    .logo-wrap img { height: 52px; width: auto; }

    .nav-links { display: flex; gap: 28px; align-items: center; }
    .nav-links a { color: var(--navy); font-family: var(--ff-titulo); font-size: .78rem; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; transition: color .2s; position: relative; }
    .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px; background: var(--ciano); transition: width .25s; }
    .nav-links a:hover { color: var(--ciano); }
    .nav-links a:hover::after { width: 100%; }

    .nav-vitrine { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(40,170,220,.12); color: var(--ciano) !important; font-family: var(--ff-titulo); font-size: .74rem !important; font-weight: 700; letter-spacing: .5px; text-transform: uppercase; border-radius: var(--radius); border: 1.5px solid rgba(40,170,220,.4); transition: background .2s, color .2s, transform .15s !important; }
    .nav-vitrine::after { display: none !important; }
    .nav-vitrine:hover { background: var(--ciano) !important; color: var(--navy) !important; border-color: var(--ciano); transform: translateY(-1px); }

    .nav-cta { background: var(--azul) !important; color: var(--branco) !important; padding: 9px 20px; border-radius: var(--radius); font-weight: 700 !important; transition: background .2s, transform .15s !important; }
    .nav-cta::after { display: none !important; }
    .nav-cta:hover { background: var(--azul-2) !important; transform: translateY(-1px); color: var(--branco) !important; }

    /* ── MENU MOBILE ── */
    .hamburger { display: none; flex-direction: column; gap: 5px; background: none; border: none; padding: 6px; cursor: pointer; }
    .hamburger span { display: block; width: 26px; height: 2px; background: var(--navy); border-radius: 2px; transition: .3s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    #navMenu { display: none; position: fixed; top: var(--header-h); left: 0; right: 0; background: var(--navy); border-top: 2px solid var(--ciano); max-height: 0; overflow: hidden; transition: max-height .35s ease; z-index: 999; }
    #navMenu.open { max-height: 500px; }
    #navMenu ul { padding: 1rem 1.5rem 1.5rem; }
    #navMenu ul li a { display: flex; align-items: center; padding: 14px 0; color: rgba(255,255,255,.85); font-family: var(--ff-titulo); font-size: .9rem; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; border-bottom: 1px solid rgba(255,255,255,.08); transition: color .2s, padding-left .2s; }
    #navMenu ul li:last-child a { border-bottom: none; }
    #navMenu ul li a:hover { color: var(--ciano); padding-left: 8px; }

    /* ── IFRAME ── */
    #vitrineFrame { position: fixed; top: var(--header-h); left: 0; width: 100%; border: none; display: block; }

    /* ── RESPONSIVO ── */
    @media (max-width: 1023px) {
      .nav-links { display: none; }
      .hamburger  { display: flex; }
      #navMenu    { display: block; }
    }
    @media (max-width: 480px) {
      .logo-wrap img { height: 40px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header id="header">
    <div class="header-inner">
      <a href="index.html" class="logo-wrap">
        <img src="images/logo.png" alt="Atommotec">
      </a>
      <nav role="navigation" aria-label="Menu principal">
        <ul class="nav-links">
          <li><a href="index.html">Início</a></li>
          <li><a href="index.html#sobre">Sobre</a></li>
          <li><a href="index.html#servicos">Serviços</a></li>
          <li><a href="index.html#planos">Planos</a></li>
          <li><a href="index.html#avaliacoes">Avaliações</a></li>
          <li><a href="index.html#contato">Contato</a></li>
          <li><a href="vitrine.html" class="nav-vitrine"><i class="fa-solid fa-store"></i> Vitrine</a></li>
          <li>
            <a href="https://wa.me/553135343329" target="_blank" rel="noopener noreferrer" class="nav-cta">
              <i class="fa-brands fa-whatsapp"></i> WhatsApp
            </a>
          </li>
        </ul>
      </nav>
      <button class="hamburger" id="hamburgerBtn" aria-label="Abrir menu" aria-expanded="false">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- NAV MOBILE -->
  <nav id="navMenu" aria-label="Menu mobile" aria-hidden="true">
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="index.html#sobre">Sobre nós</a></li>
      <li><a href="index.html#servicos">Serviços</a></li>
      <li><a href="index.html#planos">Planos</a></li>
      <li><a href="index.html#avaliacoes">Avaliações</a></li>
      <li><a href="index.html#contato">Contato</a></li>
      <li><a href="vitrine.html" style="color:var(--ciano-2)"><i class="fa-solid fa-store"></i>&nbsp; Vitrine online</a></li>
    </ul>
  </nav>

  <!-- ── IFRAME VITRINE ── -->
  <iframe
    id="vitrineFrame"
    src="https://atommotec2.egestor.com.br/vitrine/"
    title="Vitrine Atommotec"
    allowfullscreen>
  </iframe>

  <script>
    /* ── ALTURA DINÂMICA ── */
    function updateFrame() {
      document.getElementById('vitrineFrame').style.height = (window.innerHeight - 80) + 'px';
    }
    window.addEventListener('resize', updateFrame);
    updateFrame();

    /* ── MENU MOBILE ── */
    var hamburger = document.getElementById('hamburgerBtn');
    var navMenu   = document.getElementById('navMenu');

    hamburger.addEventListener('click', function() {
      var isOpen = navMenu.classList.toggle('open');
      hamburger.classList.toggle('open', isOpen);
      hamburger.setAttribute('aria-expanded', isOpen);
      navMenu.setAttribute('aria-hidden', !isOpen);
    });
    navMenu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        navMenu.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', 'false');
        navMenu.setAttribute('aria-hidden', 'true');
      });
    });
  </script>
</body>
</html>
