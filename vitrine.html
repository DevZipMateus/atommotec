<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Demonstração de Vitrine — Atommotec</title>
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    html::-webkit-scrollbar,
    body::-webkit-scrollbar { display: none; }

    a   { text-decoration: none; color: inherit; -webkit-tap-highlight-color: transparent; }
    img { display: block; max-width: 100%; }
    ul  { list-style: none; }

    :root {
      --navy:      #0C1E52;
      --navy-dark: #070E2A;
      --azul:      #1548B0;
      --ciano:     #28AADC;
      --ciano-2:   #4CC4F0;
      --branco:    #FFFFFF;
      --trans:     .3s ease;
      --ff-titulo: 'Exo 2', sans-serif;
      --ff-corpo:  'Inter', sans-serif;
    }

    /* ── HEADER 80px ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 80px; z-index: 900;
      background: var(--navy-dark);
      border-bottom: 1px solid rgba(40,170,220,.2);
      box-shadow: 0 2px 20px rgba(0,0,0,.3);
    }

    .header-inner {
      max-width: 1200px; margin: 0 auto;
      padding: 0 24px; height: 100%;
      display: flex; align-items: center; justify-content: space-between;
    }

    .logo-link { display: flex; align-items: center; }
    .logo-header {
      height: 50px; width: auto;
      filter: brightness(0) invert(1);
    }

    .nav-desktop { display: flex; gap: 26px; align-items: center; }

    .nav-link {
      font-family: var(--ff-titulo); font-size: .76rem;
      font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      color: rgba(255,255,255,.8); position: relative;
      transition: color var(--trans);
    }
    .nav-link::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 2px; background: var(--ciano);
      transition: width var(--trans);
    }
    .nav-link:hover { color: var(--ciano); }
    .nav-link:hover::after { width: 100%; }

    .btn-voltar {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 8px 18px;
      background: rgba(40,170,220,.15);
      color: var(--ciano-2);
      font-family: var(--ff-titulo); font-size: .76rem; font-weight: 700;
      letter-spacing: .5px; text-transform: uppercase;
      border-radius: 6px; border: 1.5px solid rgba(40,170,220,.4);
      transition: background var(--trans), color var(--trans), transform var(--trans);
    }
    .btn-voltar:hover {
      background: var(--ciano); color: var(--navy);
      border-color: var(--ciano); transform: translateY(-1px);
    }

    /* ── MENU MOBILE ── */
    .menu-toggle {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .menu-toggle span {
      display: block; width: 24px; height: 2px;
      background: var(--branco); border-radius: 2px; transition: .3s;
    }
    .menu-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .menu-toggle.open span:nth-child(2) { opacity: 0; }
    .menu-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    #navMenu {
      position: fixed; top: 80px; left: 0; right: 0;
      background: var(--navy-dark); border-top: 2px solid var(--ciano);
      max-height: 0; overflow: hidden; transition: max-height .35s ease; z-index: 999;
      display: none;
    }
    #navMenu.open { max-height: 360px; }
    #navMenu ul { padding: 1rem 1.5rem 1.5rem; }
    #navMenu ul li a {
      display: flex; align-items: center; padding: 13px 0;
      color: rgba(255,255,255,.85); font-family: var(--ff-titulo);
      font-size: .9rem; font-weight: 600; letter-spacing: .5px; text-transform: uppercase;
      border-bottom: 1px solid rgba(255,255,255,.08); transition: color .2s, padding-left .2s;
    }
    #navMenu ul li:last-child a { border-bottom: none; }
    #navMenu ul li a:hover { color: var(--ciano); padding-left: 8px; }

    .nav-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 998; opacity: 0; pointer-events: none; transition: opacity var(--trans);
    }
    .nav-overlay.active { opacity: 1; pointer-events: all; }

    /* ── IFRAME ── */
    #vitrineFrame {
      position: fixed; top: 80px; left: 0;
      width: 100%; border: none; display: block;
    }

    /* ── RESPONSIVO ── */
    @media (max-width: 1023px) {
      .nav-desktop { display: none; }
      .menu-toggle { display: flex; }
      #navMenu     { display: block; }
    }

    @media (max-width: 480px) {
      .logo-header { height: 40px; }
    }
  </style>
</head>
<body>

  <!-- ── HEADER ── -->
  <header id="header">
    <div class="header-inner">
      <a href="index.html" class="logo-link">
        <img src="images/logo.png" alt="Atommotec" class="logo-header">
      </a>
      <ul class="nav-desktop">
        <li><a href="index.html" class="nav-link">Início</a></li>
        <li><a href="index.html#sobre" class="nav-link">Sobre</a></li>
        <li><a href="index.html#servicos" class="nav-link">Serviços</a></li>
        <li><a href="index.html#planos" class="nav-link">Planos</a></li>
        <li><a href="index.html#contato" class="nav-link">Contato</a></li>
        <li><a href="index.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao site</a></li>
      </ul>
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- ── NAV MOBILE ── -->
  <nav id="navMenu" aria-hidden="true">
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="index.html#sobre">Sobre</a></li>
      <li><a href="index.html#servicos">Serviços</a></li>
      <li><a href="index.html#planos">Planos</a></li>
      <li><a href="index.html#contato">Contato</a></li>
      <li><a href="index.html" style="color:var(--ciano)"><i class="fas fa-arrow-left"></i>&nbsp; Voltar ao site</a></li>
    </ul>
  </nav>
  <div class="nav-overlay" id="navOverlay"></div>

  <!-- ── IFRAME VITRINE ── -->
  <iframe
    id="vitrineFrame"
    src="https://atommotec3.egestor.com.br/vitrine/"
    title="Vitrine Atommotec"
    allowfullscreen>
  </iframe>

  <script>
    /* ── ALTURA DINÂMICA ── */
    function updateFrame() {
      document.getElementById('vitrineFrame').style.height = (window.innerHeight - 80) + 'px';
    }
    window.addEventListener('resize', updateFrame);
    updateFrame();

    /* ── MENU MOBILE ── */
    var toggle   = document.getElementById('menuToggle');
    var navMenu  = document.getElementById('navMenu');
    var overlay  = document.getElementById('navOverlay');

    function openMenu() {
      navMenu.classList.add('open');
      overlay.classList.add('active');
      toggle.classList.add('open');
    }
    function closeMenu() {
      navMenu.classList.remove('open');
      overlay.classList.remove('active');
      toggle.classList.remove('open');
    }

    toggle.addEventListener('click', function() {
      navMenu.classList.contains('open') ? closeMenu() : openMenu();
    });
    overlay.addEventListener('click', closeMenu);
    navMenu.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', closeMenu);
    });
  </script>
</body>
</html>
